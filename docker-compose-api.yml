services:
  api:
    build: 
      context: .
      dockerfile: SolutionOrders.API/Dockerfile
    container_name: PMAB2026Day-api
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__ApplicationDbContext=Server=sqlserver;Database=PMAB;User=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - dev-network

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: PMAB2026Day-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong!Passw0rd
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - PMAB2026Day-data:/var/opt/mssql
    networks:
      - dev-network
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -C -U sa -P YourStrong!Passw0rd -Q "SELECT 1" -b -o /dev/null
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 30s

networks:
  dev-network:
    driver: bridge

volumes:
  PMAB2026Day-data: