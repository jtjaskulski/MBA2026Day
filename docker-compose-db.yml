services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: PMAB2026Day-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong!Passw0rd
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - PMAB2026Day-data:/var/opt/mssql
    networks:
      - dev-network

networks:
  dev-network:
    driver: bridge

volumes:
  PMAB2026Day-data: